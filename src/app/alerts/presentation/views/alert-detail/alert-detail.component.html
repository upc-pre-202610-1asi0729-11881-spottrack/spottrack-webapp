<div class="detail-page">

  <div class="breadcrumb">
    <a routerLink="/alerts" class="back-link">
      <mat-icon>arrow_back</mat-icon>
      {{ 'alerts.backToInbox' | translate }}
    </a>
  </div>

  @if (alert) {
    <div class="alert-detail-card">

      <div class="alert-detail-header" [ngClass]="'bg-' + alert.type">
        <div class="alert-icon-wrap">
          <mat-icon>{{ alert.icon }}</mat-icon>
        </div>
        <div class="alert-meta">
          <h1 class="alert-title">{{ resolveTitle(alert) }}</h1>
          <span class="alert-type-badge">{{ alert.type | uppercase }}</span>
        </div>
      </div>

      <div class="alert-body">
        <p class="alert-description">{{ resolveDescription(alert) }}</p>
        <p class="alert-date">
          <mat-icon>schedule</mat-icon>
          {{ alert.date | date:'medium' }}
        </p>
      </div>

      <div class="alert-actions">
        @if (alert.targetRoute) {
          <button class="btn-primary" (click)="navigateTo(alert.targetRoute)">
            <mat-icon>open_in_new</mat-icon>
            {{ 'alerts.goToTarget' | translate }}
          </button>
        }
        <button class="btn-dismiss" (click)="dismiss(alert.id)">
          <mat-icon>delete_outline</mat-icon>
          {{ 'alerts.dismiss' | translate }}
        </button>
      </div>

    </div>
  } @else {
    <div class="not-found">
      <mat-icon>search_off</mat-icon>
      <p>Alerta no encontrada.</p>
      <a routerLink="/alerts" class="back-link">Volver</a>
    </div>
  }

</div>
