<div class="result-page">
  <div class="result-card">
    <mat-icon class="result-icon result-icon--cancel">cancel</mat-icon>
    <h1 class="result-title">{{ 'auth.payment.cancelTitle' | translate }}</h1>
    <p class="result-subtitle">{{ 'auth.payment.cancelSubtitle' | translate }}</p>
    <button class="btn-continue" type="button" (click)="retry()">
      {{ 'auth.payment.retryBtn' | translate }}
    </button>
  </div>
</div>
