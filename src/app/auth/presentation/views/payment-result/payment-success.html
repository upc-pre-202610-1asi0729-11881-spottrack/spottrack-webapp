<div class="result-page">
  <div class="result-card">
    <mat-icon class="result-icon result-icon--success">check_circle</mat-icon>
    <h1 class="result-title">{{ 'auth.payment.successTitle' | translate }}</h1>
    <p class="result-subtitle">{{ 'auth.payment.successSubtitle' | translate }}</p>
    <button class="btn-continue" type="button" (click)="continue()">
      {{ 'auth.payment.continueBtn' | translate }}
    </button>
  </div>
</div>
